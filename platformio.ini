; PlatformIO Project Configuration File
; Carro Robot Autónomo — ESP32-S3-DevKitC-1
;
; Build: pio run
; Upload: pio run --target upload
; Monitor: pio device monitor
; Wokwi: usar wokwi/diagram.json + wokwi/wokwi.toml

[platformio]
default_envs = esp32-s3-devkitc-1

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

; --- Librerías ---
lib_deps =
    adafruit/Adafruit MPU6050@^2.2.6
    adafruit/Adafruit Unified Sensor@^1.1.14
    bblanchon/ArduinoJson@^7.0.0
    mathieucarbou/ESPAsyncWebServer @ 3.3.20

; --- Filesystem para UI web ---
board_build.filesystem = littlefs

; --- Build flags ---
; DEBUG_ENABLED=1: activa Serial.print en tiempo real (útil para debug, pero ralentiza loop)
; DEBUG_ENABLED=0 o sin definir: silencia prints de telemetría para máximo rendimiento
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; -DDEBUG_ENABLED=1    ; Descomentar para debug serial verbose

; --- Entorno de tests nativos (compila en PC, no en MCU) ---
[env:native]
platform = native
test_framework = unity
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
